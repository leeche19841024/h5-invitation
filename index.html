<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动邀请函</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>诚邀您参加我们的活动</h1>
        </header>
        <main>
            <section class="event-details">
                <h2>活动详情</h2>
                <p><strong>活动主题：</strong>南京投石技术交流与实践分享会</p>
                <p><strong>活动时间：</strong>2026年03月28日 14:00 - 17:00</p>
                <p><strong>活动地点：</strong>在线会议（链接将在报名成功后发送）</p>
                <p><strong>活动简介：</strong>本次活动旨在分享最新的技术动态，探讨响应式设计和性能优化的最佳实践，并提供一个开发者交流的平台。</p>
                <p><strong>主办方：</strong>南京投石科技有限公司</p>
            </section>
            <section class="rsvp">
                <h2>在线报名</h2>
                <form id="rsvp-form">
                    <div class="form-group">
                        <label for="name">姓名：</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="contact">联系方式：</label>
                        <input type="text" id="contact" name="contact" required>
                    </div>
                    <button type="submit" class="btn">确认出席</button>
                </form>
            </section>
            <section class="share">
                <h2>分享邀请函</h2>
                <button id="share-btn" class="btn">分享给朋友</button>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 Trae IDE. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
    <!-- GitHub Pages refresh trigger -->

</body>
</html>
